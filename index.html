
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b; --surface: #111114; --surface2: #18181d;
      --border: #222228; --accent: #e8b04b; --accent2: #c4873a;
      --text: #e8e8ec; --muted: #666672; --danger: #e84b4b;
      --radius: 8px; --header-h: 62px; --tabs-h: 48px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: "Syne", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input { font-family: inherit; }
    /* ── Header ── */
    #header {
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); gap: 20px; flex-shrink: 0; z-index: 20;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
    .logo span { color: var(--accent); }
    #search-wrap { flex: 1; max-width: 460px; position: relative; }
    #search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search {
      width: 100%; height: 38px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); font-size: 14px; padding: 0 36px 0 38px; outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    #mode-toggle {
      display: flex; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden; flex-shrink: 0;
    }
    .mode-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--muted);
      transition: background .2s, color .2s; border-radius: 20px;
    }
    .mode-btn.active { background: var(--accent); color: #000; }
    #sort-sel {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 13px;
      padding: 6px 10px; border-radius: var(--radius); outline: none; cursor: pointer;
    }
    #theme-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 16px; transition: border-color .2s;
    }
    #theme-btn:hover { border-color: var(--accent); }
    /* ── Channel Tabs ── */
    #tabs-bar {
      height: var(--tabs-h); display: flex; align-items: center;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; gap: 4px; overflow-x: auto; flex-shrink: 0; z-index: 10;
      scrollbar-width: none;
    }
    #tabs-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      color: var(--muted); white-space: nowrap; transition: background .2s, color .2s;
      border: 1px solid transparent;
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    /* ── Layout ── */
    #main { flex: 1; overflow: hidden; display: flex; }
    #grid-panel { flex: 1; overflow-y: auto; padding: 20px; }
    #grid-panel::-webkit-scrollbar { width: 6px; }
    #grid-panel::-webkit-scrollbar-track { background: var(--bg); }
    #grid-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #section-title { font-size: 13px; color: var(--muted); margin-bottom: 16px; letter-spacing: .5px; text-transform: uppercase; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; transition: transform .18s, border-color .18s, box-shadow .18s;
      position: relative;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 28px rgba(232,176,75,.12); }
    .card.active-card { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
    .thumb {
      width: 100%; aspect-ratio: 16/9; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 36px; position: relative;
    }
    .thumb-progress {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--accent); transition: width .3s;
    }
    .card-info { padding: 10px 12px 12px; }
    .card-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.4; margin-bottom: 6px;
    }
    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .card-channel { font-size: 11px; color: var(--accent); font-weight: 700; }
    .card-size { font-size: 11px; color: var(--muted); font-family: "DM Mono", monospace; }
    /* ── Player Panel ── */
    #player-panel {
      width: 480px; flex-shrink: 0; border-left: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column;
      transition: width .3s;
    }
    #player-panel.hidden { width: 0; overflow: hidden; border: none; }
    #player-panel.theatre { width: 720px; }
    #player-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #now-playing { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #close-player { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); }
    #close-player:hover { color: var(--danger); }
    #video-wrap { position: relative; background: #000; width: 100%; aspect-ratio: 16/9; flex-shrink: 0; }
    #video { width: 100%; height: 100%; display: block; background: #000; }
    #controls {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px 16px; flex: 1; overflow-y: auto;
    }
    /* progress */
    #prog-wrap { display: flex; align-items: center; gap: 10px; }
    #time-cur, #time-dur { font-size: 11px; color: var(--muted); font-family: "DM Mono", monospace; white-space: nowrap; }
    #progress { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; cursor: pointer; position: relative; transition: height .15s; }
    #progress:hover { height: 7px; }
    #prog-bar { height: 100%; background: var(--accent); border-radius: 2px; pointer-events: none; }
    /* main controls */
    #ctrl-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .ctrl-btn {
      width: 38px; height: 38px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 15px; transition: background .15s, border-color .15s;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: var(--surface); }
    #play-btn { width: 46px; height: 46px; background: var(--accent); border: none; font-size: 18px; color: #000; }
    #play-btn:hover { background: var(--accent2); }
    /* secondary controls */
    #ctrl-row2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ctrl-label { font-size: 11px; color: var(--muted); }
    select.ctrl-select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-family: inherit; font-size: 12px; padding: 4px 8px; border-radius: var(--radius);
      outline: none; cursor: pointer;
    }
    select.ctrl-select:hover { border-color: var(--accent); }
    .toggle-btn {
      padding: 4px 12px; font-size: 12px; font-weight: 600; border-radius: var(--radius);
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      transition: all .15s;
    }
    .toggle-btn.on { background: var(--accent); color: #000; border-color: var(--accent); }
    /* volume */
    #vol-row { display: flex; align-items: center; gap: 10px; }
    #vol-icon { font-size: 14px; color: var(--muted); width: 20px; text-align: center; }
    #volume { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; cursor: pointer; }
    #vol-bar { height: 100%; background: var(--accent); border-radius: 2px; pointer-events: none; }
    /* video info */
    #vid-info { padding-top: 8px; border-top: 1px solid var(--border); }
    #vid-info .info-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    #vid-info .info-channel { font-size: 12px; color: var(--accent); }
    #vid-info .info-size { font-size: 11px; color: var(--muted); font-family: "DM Mono", monospace; margin-top: 2px; }
    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
    .toast {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 16px; font-size: 13px; color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: slideIn .25s ease;
      max-width: 300px;
    }
    .toast.success { border-color: var(--accent); }
    .toast.error { border-color: var(--danger); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    /* ── Empty / Loading ── */
    #empty { display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; height: 200px; color: var(--muted); font-size: 14px; }
    #loader { display: none; align-items: center; justify-content: center; height: 200px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Light theme ── */
    body.light {
      --bg: #f4f4f6; --surface: #fff; --surface2: #ebebef;
      --border: #d8d8e0; --text: #111114; --muted: #888896;
    }
    /* ── Responsive ── */
    @media (max-width: 900px) {
      #player-panel { position: fixed; inset: 0; width: 100% !important; z-index: 50; }
      #player-panel.hidden { display: none; }
    }
    @media (max-width: 600px) {
      #header { gap: 10px; padding: 0 12px; }
      #sort-sel, #mode-toggle { display: none; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      #grid-panel { padding: 12px; }
    }
  </style>
</head>
<body>
<!-- ── Header ── -->
<header id="header">
  <div class="logo">Stream<span>Vault</span></div>
  <div id="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="Rechercher..." autocomplete="off" />
  </div>
  <div id="mode-toggle">
    <button class="mode-btn active" data-mode="video">📹 Vidéos</button>
    <button class="mode-btn" data-mode="channel">📺 Chaînes</button>
  </div>
  <select id="sort-sel">
    <option value="recent">🕐 Récent</option>
    <option value="name">🔤 Nom</option>
    <option value="size">📦 Taille</option>
  </select>
  <button id="theme-btn" title="Thème">🌙</button>
</header>
<!-- ── Channel Tabs ── -->
<div id="tabs-bar">
  <button class="tab-btn active" data-channel="">✨ Tout</button>
</div>
<!-- ── Main ── -->
<div id="main">
  <!-- Grid -->
  <div id="grid-panel">
    <div id="section-title">Toutes les vidéos</div>
    <div id="loader"><div class="spinner"></div></div>
    <div id="empty"><span style="font-size:40px">📭</span><span>Aucune vidéo trouvée</span></div>
    <div id="grid"></div>
  </div>
  <!-- Player -->
  <div id="player-panel" class="hidden">
    <div id="player-header">
      <span id="now-playing">—</span>
      <button class="ctrl-btn toggle-btn" id="theatre-btn" title="Mode théâtre">⛶</button>
      <button id="close-player" title="Fermer">✕</button>
    </div>
    <div id="video-wrap">
      <video id="video" preload="metadata"></video>
    </div>
    <div id="controls">
      <!-- Progress -->
      <div id="prog-wrap">
        <span id="time-cur">0:00</span>
        <div id="progress"><div id="prog-bar" style="width:0%"></div></div>
        <span id="time-dur">0:00</span>
      </div>
      <!-- Main Controls -->
      <div id="ctrl-row">
        <button class="ctrl-btn" id="skip-back" title="-10s">⏮</button>
        <button class="ctrl-btn" id="prev-btn" title="Précédent">⏪</button>
        <button class="ctrl-btn" id="play-btn" title="Lecture">▶</button>
        <button class="ctrl-btn" id="next-btn" title="Suivant">⏩</button>
        <button class="ctrl-btn" id="skip-fwd" title="+10s">⏭</button>
      </div>
      <!-- Secondary Controls -->
      <div id="ctrl-row2">
        <span class="ctrl-label">Vitesse</span>
        <select class="ctrl-select" id="speed-sel">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
        <span class="ctrl-label">Qualité</span>
        <select class="ctrl-select" id="quality-sel">
          <option value="auto" selected>Auto</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
        </select>
        <button class="toggle-btn" id="pip-btn" title="Picture-in-Picture">⧉ PiP</button>
        <button class="toggle-btn" id="mute-btn">🔊</button>
      </div>
      <!-- Volume -->
      <div id="vol-row">
        <span id="vol-icon">🔊</span>
        <div id="volume"><div id="vol-bar" style="width:80%"></div></div>
        <span class="ctrl-label" id="vol-pct">80%</span>
      </div>
      <!-- Info -->
      <div id="vid-info">
        <div class="info-title" id="info-title">—</div>
        <div class="info-channel" id="info-channel">—</div>
        <div class="info-size" id="info-size">—</div>
      </div>
    </div>
  </div>
</div>
<!-- Toasts -->
<div id="toast-container"></div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://streamvault-api.onrender.com'; // ← remplace par ton URL Render
const WAKE_INTERVAL = 8 * 60 * 1000; // 8 min
const PROGRESS_KEY  = 'sv_progress';
const THEME_KEY     = 'sv_theme';
// ─── STATE ────────────────────────────────────────────────────────────────────
let allVideos      = [];
let filteredVideos = [];
let currentIndex   = -1;
let activeChannel  = '';
let searchMode     = 'video';
let isDragging     = false;
let progress       = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
let lightTheme     = localStorage.getItem(THEME_KEY) === 'light';
// ─── ELEMENTS ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const searchEl     = $('search');
const gridEl       = $('grid');
const loaderEl     = $('loader');
const emptyEl      = $('empty');
const tabsBar      = $('tabs-bar');
const playerPanel  = $('player-panel');
const videoEl      = $('video');
const playBtn      = $('play-btn');
const progBar      = $('prog-bar');
const progressEl   = $('progress');
const timeCur      = $('time-cur');
const timeDur      = $('time-dur');
const volBar       = $('vol-bar');
const volumeEl     = $('volume');
const volPct       = $('vol-pct');
const nowPlaying   = $('now-playing');
const sectionTitle = $('section-title');
const speedSel     = $('speed-sel');
const qualitySel   = $('quality-sel');
const infoTitle    = $('info-title');
const infoChannel  = $('info-channel');
const infoSize     = $('info-size');
// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(s) {
  if (isNaN(s)) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes > 1e9) return (bytes/1e9).toFixed(1) + ' GB';
  if (bytes > 1e6) return (bytes/1e6).toFixed(1) + ' MB';
  return (bytes/1e3).toFixed(0) + ' KB';
}
function toast(msg, type = 'info', duration = 3000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  $('toast-container').appendChild(t);
  setTimeout(() => {
    t.style.animation = 'fadeOut .3s ease forwards';
    setTimeout(() => t.remove(), 300);
  }, duration);
}
function saveProgress() {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
}
// ─── WAKE RENDER ─────────────────────────────────────────────────────────────
async function wakeServer() {
  try {
    await fetch(`${API}/wake`);
    console.log('🔔 Server awake');
  } catch(e) {}
}
wakeServer();
setInterval(wakeServer, WAKE_INTERVAL);
// ─── FETCH DATA ───────────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    const res  = await fetch(`${API}/channels`);
    const list = await res.json();
    tabsBar.innerHTML = '<button class="tab-btn active" data-channel="">✨ Tout</button>';
    list.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.dataset.channel = ch;
      btn.textContent = '📺 ' + ch;
      tabsBar.appendChild(btn);
    });
  } catch(e) {
    toast('Impossible de charger les chaînes', 'error');
  }
}
async function loadVideos() {
  loaderEl.style.display = 'flex';
  emptyEl.style.display  = 'none';
  gridEl.innerHTML       = '';
  const q    = searchEl.value.trim();
  const sort = $('sort-sel').value;
  const params = new URLSearchParams({ search: q, mode: searchMode, sort });
  try {
    const res = await fetch(`${API}/videos?${params}`);
    allVideos = await res.json();
  } catch(e) {
    toast('Erreur de connexion au serveur', 'error');
    loaderEl.style.display = 'none';
    return;
  }
  loaderEl.style.display = 'none';
  applyFilters();
}
// ─── FILTER & RENDER ──────────────────────────────────────────────────────────
function applyFilters() {
  filteredVideos = activeChannel
    ? allVideos.filter(v => v.channel === activeChannel)
    : allVideos;
  sectionTitle.textContent = activeChannel
    ? `📺 ${activeChannel} — ${filteredVideos.length} vidéo(s)`
    : `✨ Tout — ${filteredVideos.length} vidéo(s)`;
  renderGrid();
}
function renderGrid() {
  gridEl.innerHTML = '';
  emptyEl.style.display = filteredVideos.length === 0 ? 'flex' : 'none';
  filteredVideos.forEach((v, i) => {
    const prog = progress[v.path];
    const pct  = (v.duration && prog) ? Math.round((prog / v.duration) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'card' + (currentIndex === i ? ' active-card' : '');
    card.innerHTML = `
      <div class="thumb">
        🎬
        <div class="thumb-progress" style="width:${pct}%"></div>
      </div>
      <div class="card-info">
        <div class="card-title">${v.name.replace(/\.[^/.]+$/, '')}</div>
        <div class="card-meta">
          <span class="card-channel">${v.channel}</span>
          <span class="card-size">${fmtSize(v.size)}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => playVideo(i));
    gridEl.appendChild(card);
  });
}
// ─── PLAYER ───────────────────────────────────────────────────────────────────
function playVideo(index) {
  currentIndex = index;
  const v = filteredVideos[index];
  if (!v) return;
  const url = `${API}/stream/${encodeURIComponent(v.path)}`;
  videoEl.src = url;
  videoEl.load();
  // Reprendre la progression
  const saved = progress[v.path];
  if (saved && saved > 5) {
    videoEl.addEventListener('loadedmetadata', function onMeta() {
      videoEl.currentTime = saved;
      videoEl.removeEventListener('loadedmetadata', onMeta);
      toast(`▶ Reprise à ${fmt(saved)}`, 'success');
    }, { once: true });
  }
  videoEl.play().catch(() => {});
  nowPlaying.textContent = v.name.replace(/\.[^/.]+$/, '');
  infoTitle.textContent   = v.name.replace(/\.[^/.]+$/, '');
  infoChannel.textContent = '📺 ' + v.channel;
  infoSize.textContent    = fmtSize(v.size);
  playerPanel.classList.remove('hidden');
  playBtn.textContent = '⏸';
  renderGrid();
  toast(`▶ ${v.name.replace(/\.[^/.]+$/, '')}`, 'success');
}
// Progress bar
videoEl.addEventListener('timeupdate', () => {
  if (isDragging) return;
  const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
  progBar.style.width = pct + '%';
  timeCur.textContent = fmt(videoEl.currentTime);
  timeDur.textContent = fmt(videoEl.duration);
  // Sauvegarder la progression
  const v = filteredVideos[currentIndex];
  if (v && videoEl.currentTime > 2) {
    progress[v.path] = videoEl.currentTime;
    saveProgress();
  }
});
videoEl.addEventListener('ended', () => {
  playBtn.textContent = '▶';
  // Supprimer la progression sauvegardée
  const v = filteredVideos[currentIndex];
  if (v) { delete progress[v.path]; saveProgress(); }
  // Passer à la vidéo suivante
  if (currentIndex < filteredVideos.length - 1) {
    setTimeout(() => playVideo(currentIndex + 1), 800);
  }
});
videoEl.addEventListener('play',  () => playBtn.textContent = '⏸');
videoEl.addEventListener('pause', () => playBtn.textContent = '▶');
// Click progress
progressEl.addEventListener('click', e => {
  const r = progressEl.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  videoEl.currentTime = pct * videoEl.duration;
  progBar.style.width = pct * 100 + '%';
});
// Volume
volumeEl.addEventListener('click', e => {
  const r = volumeEl.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  videoEl.volume = pct;
  volBar.style.width = pct * 100 + '%';
  volPct.textContent = Math.round(pct * 100) + '%';
  $('vol-icon').textContent = pct === 0 ? '🔇' : pct < 0.5 ? '🔉' : '🔊';
});
// ─── CONTROLS ─────────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (videoEl.paused) videoEl.play();
  else videoEl.pause();
});
$('skip-back').addEventListener('click', () => {
  videoEl.currentTime = Math.max(0, videoEl.currentTime - 10);
  toast('⏮ -10s');
});
$('skip-fwd').addEventListener('click', () => {
  videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + 10);
  toast('⏭ +10s');
});
$('prev-btn').addEventListener('click', () => {
  if (currentIndex > 0) playVideo(currentIndex - 1);
});
$('next-btn').addEventListener('click', () => {
  if (currentIndex < filteredVideos.length - 1) playVideo(currentIndex + 1);
});
$('close-player').addEventListener('click', () => {
  videoEl.pause();
  playerPanel.classList.add('hidden');
  playerPanel.classList.remove('theatre');
});
$('theatre-btn').addEventListener('click', () => {
  playerPanel.classList.toggle('theatre');
  toast(playerPanel.classList.contains('theatre') ? '⛶ Mode théâtre' : '◻ Mode normal');
});
speedSel.addEventListener('change', () => {
  videoEl.playbackRate = parseFloat(speedSel.value);
  toast(`⚡ Vitesse ${speedSel.value}×`);
});
qualitySel.addEventListener('change', () => {
  toast(`🎞 Qualité ${qualitySel.value === 'auto' ? 'automatique' : qualitySel.value + 'p'}`);
});
$('pip-btn').addEventListener('click', async () => {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      toast('⧉ PiP désactivé');
    } else {
      await videoEl.requestPictureInPicture();
      toast('⧉ PiP activé', 'success');
    }
  } catch(e) {
    toast('PiP non supporté', 'error');
  }
});
$('mute-btn').addEventListener('click', () => {
  videoEl.muted = !videoEl.muted;
  $('mute-btn').textContent = videoEl.muted ? '🔇 Muet' : '🔊';
  $('vol-icon').textContent  = videoEl.muted ? '🔇' : '🔊';
  toast(videoEl.muted ? '🔇 Son coupé' : '🔊 Son activé');
});
// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle('light', lightTheme);
  $('theme-btn').textContent = lightTheme ? '☀️' : '🌙';
}
$('theme-btn').addEventListener('click', () => {
  lightTheme = !lightTheme;
  localStorage.setItem(THEME_KEY, lightTheme ? 'light' : 'dark');
  applyTheme();
  toast(lightTheme ? '☀️ Thème clair' : '🌙 Thème sombre');
});
applyTheme();
// ─── TABS ─────────────────────────────────────────────────────────────────────
tabsBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  tabsBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeChannel = btn.dataset.channel;
  applyFilters();
});
// ─── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadVideos, 350);
});
// ─── SEARCH MODE ─────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMode = btn.dataset.mode;
    if (searchEl.value.trim()) loadVideos();
    toast(searchMode === 'channel' ? '📺 Recherche par chaîne' : '📹 Recherche par vidéo');
  });
});
// ─── SORT ─────────────────────────────────────────────────────────────────────
$('sort-sel').addEventListener('change', loadVideos);
// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')       { e.preventDefault(); playBtn.click(); }
  if (e.code === 'ArrowLeft')   { videoEl.currentTime -= 10; toast('⏮ -10s'); }
  if (e.code === 'ArrowRight')  { videoEl.currentTime += 10; toast('⏭ +10s'); }
  if (e.code === 'ArrowUp')     { videoEl.volume = Math.min(1, videoEl.volume + 0.1); }
  if (e.code === 'ArrowDown')   { videoEl.volume = Math.max(0, videoEl.volume - 0.1); }
  if (e.code === 'Escape')      { $('close-player').click(); }
});
// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadChannels();
  await loadVideos();
})();
</script>
</body>
</html>
