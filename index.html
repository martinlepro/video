<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b; --surface: #111114; --surface2: #18181d;
      --border: #222228; --accent: #e8b04b; --accent2: #c4873a;
      --text: #e8e8ec; --muted: #666672; --danger: #e84b4b;
      --radius: 8px; --sidebar-w: 240px; --header-h: 62px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      overflow: hidden; display: flex; flex-direction: column;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input { font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    /* ─── Header ─── */
    #header {
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); gap: 24px; flex-shrink: 0; z-index: 10;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
    .logo span { color: var(--accent); }
    #search-wrap { flex: 1; max-width: 480px; position: relative; }
    #search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; height: 38px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); font-size: 14px; padding: 0 36px 0 38px;
      outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    #clear-search {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 18px; line-height: 1;
      display: none; padding: 2px 6px;
    }
    #clear-search.visible { display: block; }
    #clear-search:hover { color: var(--text); }
    .header-stat { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ─── Layout ─── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ─── Sidebar ─── */
    #sidebar {
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border); display: flex;
      flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 16px 0;
    }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); padding: 0 16px 8px;
    }
    .channel-btn {
      display: flex; align-items: center; gap: 10px; padding: 9px 16px;
      width: 100%; text-align: left; font-size: 14px; font-weight: 500;
      color: var(--muted); transition: all .15s; position: relative;
    }
    .channel-btn:hover { color: var(--text); background: var(--surface2); }
    .channel-btn.active { color: var(--accent); background: rgba(232,176,75,0.07); }
    .channel-btn.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent);
    }
    .channel-count {
      margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--surface2); padding: 1px 6px; border-radius: 10px; color: var(--muted);
    }
    .channel-btn.active .channel-count { background: rgba(232,176,75,0.15); color: var(--accent); }

    /* ─── Main ─── */
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }
    #main::-webkit-scrollbar { width: 6px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #section-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    #section-title span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; }

    /* ─── Grid ─── */
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s; position: relative;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .card-thumb {
      width: 100%; aspect-ratio: 16/9; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; position: relative; overflow: hidden;
    }
    .card-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.8));
      opacity: 0; transition: opacity .2s;
    }
    .card:hover .card-thumb::after { opacity: 1; }
    .play-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; z-index: 2; opacity: 0; transition: opacity .2s;
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 48px; height: 48px; background: rgba(232,176,75,.9);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .card-info { padding: 12px; }
    .card-title {
      font-size: 14px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
    }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-channel {
      background: var(--surface2); padding: 2px 7px; border-radius: 10px;
      color: var(--accent); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .card-size {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    }
    .card-ext {
      background: var(--surface2); padding: 2px 5px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    }

    .state-box { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .state-box .icon { font-size: 56px; margin-bottom: 16px; }
    .state-box p { font-size: 15px; }

    /* ─── Modal / Player ─── */
    #modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 100;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); padding: 20px;
    }
    #modal-bg.open { display: flex; }

    #player-wrap {
      width: 100%; max-width: 1000px; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.8); animation: slideUp .25s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #player-header {
      display: flex; align-items: center; padding: 14px 18px;
      border-bottom: 1px solid var(--border); gap: 12px;
    }
    #player-title { font-size: 15px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #player-channel {
      font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      color: var(--accent); background: rgba(232,176,75,.1); padding: 3px 8px; border-radius: 10px;
    }
    #close-btn {
      width: 32px; height: 32px; background: var(--surface2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 20px; line-height: 1; transition: all .15s;
    }
    #close-btn:hover { background: var(--border); color: var(--text); }

    #video-container { background: #000; position: relative; aspect-ratio: 16/9; width: 100%; }
    #video-container video { width: 100%; height: 100%; display: block; }
    #video-loading {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 14px; pointer-events: none; opacity: 0; transition: opacity .2s;
    }
    #video-loading.active { opacity: 1; }
    #video-loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Custom controls ─── */
    #custom-controls { background: var(--surface); padding: 12px 16px; }
    #progress-wrap {
      width: 100%; height: 6px; background: var(--surface2);
      border-radius: 3px; cursor: pointer; position: relative;
      margin-bottom: 12px; overflow: hidden;
    }
    #progress-buffer {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--border); width: 0; transition: width .2s;
    }
    #progress-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); width: 0; transition: width .05s linear;
    }
    #controls-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ctrl-btn {
      width: 34px; height: 34px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); transition: background .15s; gap: 4px;
    }
    .ctrl-btn:hover { background: var(--surface2); }
    .ctrl-btn.primary { background: var(--accent); color: #000; }
    .ctrl-btn.primary:hover { background: var(--accent2); }
    .ctrl-btn span { font-size: 11px; font-family: 'DM Mono', monospace; }

    #frame-group {
      display: flex; align-items: center; gap: 4px; background: var(--surface2);
      border-radius: 6px; padding: 2px;
    }
    #frame-group .ctrl-btn { width: auto; padding: 0 8px; height: 30px; }
    #fps-select {
      background: transparent; border: none; color: var(--text);
      font-size: 11px; font-family: 'DM Mono', monospace;
      padding: 0 4px; outline: none; cursor: pointer;
    }
    #fps-select option { background: var(--surface); }

    #volume-wrap { display: flex; align-items: center; gap: 6px; }
    #volume-slider {
      width: 70px; -webkit-appearance: none; appearance: none;
      background: transparent; height: 20px;
    }
    #volume-slider::-webkit-slider-runnable-track {
      height: 4px; background: var(--surface2); border-radius: 2px;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: var(--accent); border-radius: 50%; margin-top: -4px; cursor: pointer;
    }
    #volume-slider::-moz-range-track { height: 4px; background: var(--surface2); border-radius: 2px; }
    #volume-slider::-moz-range-thumb {
      width: 12px; height: 12px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: none;
    }

    #time-display {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--muted); margin-left: 4px;
    }
    .divider { flex: 1; }

    #dl-btn {
      display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 34px;
      background: var(--surface2); border-radius: 6px; color: var(--text);
      font-size: 12px; font-weight: 600; transition: all .15s;
    }
    #dl-btn:hover { background: var(--accent); color: #000; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #main { padding: 18px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .header-stat { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── Header ─── -->
<header id="header">
  <div class="logo">Stream<span>Vault</span></div>
  <div id="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Rechercher une vidéo..." autocomplete="off" />
    <button id="clear-search" title="Effacer">×</button>
  </div>
  <div class="header-stat" id="total-stat">— vidéos</div>
</header>

<!-- ─── Layout ─── -->
<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-label">Channels</div>
    <div id="channels-list"></div>
  </aside>

  <main id="main">
    <h2 id="section-title">Toutes les vidéos <span id="section-count"></span></h2>
    <div id="grid">
      <div class="state-box"><div class="icon">⏳</div><p>Chargement…</p></div>
    </div>
  </main>
</div>

<!-- ─── Modal Player ─── -->
<div id="modal-bg">
  <div id="player-wrap">
    <div id="player-header">
      <span id="player-channel">root</span>
      <span id="player-title">—</span>
      <button id="close-btn" title="Fermer (Échap)">×</button>
    </div>

    <div id="video-container">
      <video id="video" preload="metadata" playsinline></video>
      <div id="video-loading"><div class="spinner"></div>Chargement…</div>
    </div>

    <div id="custom-controls">
      <div id="progress-wrap">
        <div id="progress-buffer"></div>
        <div id="progress-bar"></div>
      </div>

      <div id="controls-row">
        <button class="ctrl-btn primary" id="play-btn" title="Lecture / Pause (Espace)">
          <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div id="volume-wrap">
          <button class="ctrl-btn" id="mute-btn" title="Muet (M)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="1" />
        </div>

        <div id="time-display">0:00 / 0:00</div>
        <div class="divider"></div>

        <div id="frame-group" title="Avancer / Reculer par frames">
          <button class="ctrl-btn" id="prev-frame" title="Frame précédente (←)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            <span>-1f</span>
          </button>
          <select id="fps-select" title="FPS">
            <option value="24">24fps</option>
            <option value="30" selected>30fps</option>
            <option value="60">60fps</option>
          </select>
          <button class="ctrl-btn" id="next-frame" title="Frame suivante (→)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.25v8.5L8.5 12zM16 6h2v12h-2z"/></svg>
            <span>+1f</span>
          </button>
        </div>

        <button class="ctrl-btn" id="fs-btn" title="Plein écran (F)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>

        <button id="dl-btn" title="Télécharger la vidéo complète">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Télécharger
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://server-video-regarder.onrender.com';

// ─── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtTime = s => {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
};
const escapeHtml = str => String(str).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

// ─── State ───────────────────────────────────────────────────────────────────
let allVideos = [];
let channels = [];
let currentChannel = null; // null = all
let currentVideo = null;
let searchQuery = '';

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadChannels() {
  try {
    channels = await api('/api/channels');
    renderChannels();
  } catch (e) {
    console.error('Failed to load channels:', e);
  }
}

async function loadVideos() {
  try {
    let url = '/api/videos';
    if (currentChannel) url += `?channel=${encodeURIComponent(currentChannel)}`;
    allVideos = await api(url);
    renderVideos();
  } catch (e) {
    console.error('Failed to load videos:', e);
    $('grid').innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>Erreur de connexion au serveur</p></div>`;
  }
}

async function searchVideos(q) {
  try {
    const res = await api(`/api/search?q=${encodeURIComponent(q)}`);
    allVideos = res;
    renderVideos();
  } catch (e) {
    console.error('Search failed:', e);
  }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderChannels() {
  const list = $('channels-list');
  list.innerHTML = '';

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'channel-btn' + (currentChannel === null ? ' active' : '');
  const totalAll = channels.reduce((sum, c) => c.name === 'root' ? sum + c.videoCount : sum + c.videoCount, 0);
  allBtn.innerHTML = `<span>🎬</span><span>Tout</span><span class="channel-count">${totalAll}</span>`;
  allBtn.onclick = () => { currentChannel = null; searchQuery=''; $('search').value=''; $('clear-search').classList.remove('visible'); loadVideos(); renderChannels(); };
  list.appendChild(allBtn);

  channels.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (currentChannel === ch.name ? ' active' : '');
    const icon = ch.name === 'root' ? '📁' : '📺';
    btn.innerHTML = `<span>${icon}</span><span>${escapeHtml(ch.label)}</span><span class="channel-count">${ch.videoCount}</span>`;
    btn.onclick = () => { currentChannel = ch.name; searchQuery=''; $('search').value=''; $('clear-search').classList.remove('visible'); loadVideos(); renderChannels(); };
    list.appendChild(btn);
  });
}

function renderVideos() {
  const grid = $('grid');
  $('total-stat').textContent = `${allVideos.length} vidéo${allVideos.length>1?'s':''}`;
  $('section-count').textContent = `· ${allVideos.length}`;

  if (searchQuery) $('section-title').firstChild.textContent = `Recherche : "${searchQuery}" `;
  else if (currentChannel) $('section-title').firstChild.textContent = `${currentChannel} `;
  else $('section-title').firstChild.textContent = `Toutes les vidéos `;

  if (allVideos.length === 0) {
    grid.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>Aucune vidéo trouvée</p></div>`;
    return;
  }

  grid.innerHTML = allVideos.map(v => `
    <div class="card" data-path="${escapeHtml(v.path)}">
      <div class="card-thumb">
        🎞️
        <div class="play-overlay"><div class="play-circle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
        </div></div>
      </div>
      <div class="card-info">
        <div class="card-title" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
        <div class="card-meta">
          <span class="card-channel">${escapeHtml(v.channel)}</span>
          <span class="card-size">${v.sizeMB} MB</span>
          <span class="card-ext">${escapeHtml(v.ext.replace('.',''))}</span>
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const path = card.dataset.path;
      const video = allVideos.find(v => v.path === path);
      if (video) openPlayer(video);
    });
  });
}

// ─── Search ──────────────────────────────────────────────────────────────────
let searchTimer;
$('search').addEventListener('input', e => {
  const q = e.target.value.trim();
  searchQuery = q;
  $('clear-search').classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (q) searchVideos(q);
    else loadVideos();
  }, 300);
});
$('clear-search').addEventListener('click', () => {
  $('search').value = '';
  searchQuery = '';
  $('clear-search').classList.remove('visible');
  loadVideos();
});

// ─── Player ──────────────────────────────────────────────────────────────────
const video = $('video');

function openPlayer(v) {
  currentVideo = v;
  $('player-title').textContent = v.title;
  $('player-channel').textContent = v.channel;
  video.src = `${API_BASE}/stream/${encodeURI(v.path)}`;
  $('modal-bg').classList.add('open');
  $('video-loading').classList.add('active');
  video.load();
  video.play().catch(()=>{});
}

function closePlayer() {
  $('modal-bg').classList.remove('open');
  video.pause();
  video.removeAttribute('src');
  video.load();
  currentVideo = null;
}

$('close-btn').addEventListener('click', closePlayer);
$('modal-bg').addEventListener('click', e => {
  if (e.target.id === 'modal-bg') closePlayer();
});

// Video events
video.addEventListener('waiting', () => $('video-loading').classList.add('active'));
video.addEventListener('playing', () => $('video-loading').classList.remove('active'));
video.addEventListener('canplay', () => $('video-loading').classList.remove('active'));
video.addEventListener('loadedmetadata', () => updateTime());
video.addEventListener('timeupdate', updateTime);
video.addEventListener('progress', updateBuffer);
video.addEventListener('play',  () => updatePlayIcon(true));
video.addEventListener('pause', () => updatePlayIcon(false));
video.addEventListener('volumechange', () => {
  $('volume-slider').value = video.muted ? 0 : video.volume;
});
video.addEventListener('error', () => {
  $('video-loading').classList.remove('active');
  console.error('Video error:', video.error);
});

function updateTime() {
  const cur = video.currentTime || 0;
  const dur = video.duration || 0;
  $('time-display').textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  $('progress-bar').style.width = dur ? `${(cur/dur)*100}%` : '0%';
}
function updateBuffer() {
  if (!video.buffered.length || !video.duration) return;
  const end = video.buffered.end(video.buffered.length - 1);
  $('progress-buffer').style.width = `${(end/video.duration)*100}%`;
}
function updatePlayIcon(playing) {
  $('play-icon').innerHTML = playing
    ? '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// Progress click
$('progress-wrap').addEventListener('click', e => {
  if (!video.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  video.currentTime = ratio * video.duration;
});

// Play/Pause
$('play-btn').addEventListener('click', () => {
  video.paused ? video.play() : video.pause();
});

// Volume
$('volume-slider').addEventListener('input', e => {
  video.volume = Number(e.target.value);
  video.muted = video.volume === 0;
});
$('mute-btn').addEventListener('click', () => {
  video.muted = !video.muted;
});

// Frames
$('prev-frame').addEventListener('click', () => {
  video.pause();
  video.currentTime = Math.max(0, video.currentTime - 1 / Number($('fps-select').value));
});
$('next-frame').addEventListener('click', () => {
  video.pause();
  video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 1 / Number($('fps-select').value));
});

// Fullscreen
$('fs-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) $('video-container').requestFullscreen?.();
  else document.exitFullscreen?.();
});

// Download
$('dl-btn').addEventListener('click', () => {
  if (!currentVideo) return;
  const url = `${API_BASE}/download/${encodeURI(currentVideo.path)}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = currentVideo.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (!$('modal-bg').classList.contains('open')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  switch(e.key) {
    case 'Escape': closePlayer(); break;
    case ' ':
      e.preventDefault();
      video.paused ? video.play() : video.pause();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      video.pause();
      video.currentTime = Math.max(0, video.currentTime - 1 / Number($('fps-select').value));
      break;
    case 'ArrowRight':
      e.preventDefault();
      video.pause();
      video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 1 / Number($('fps-select').value));
      break;
    case 'f': case 'F':
      if (!document.fullscreenElement) $('video-container').requestFullscreen?.();
      else document.exitFullscreen?.();
      break;
    case 'm': case 'M':
      video.muted = !video.muted;
      break;
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
(async () => {
  await loadChannels();
  await loadVideos();
})();
</script>
</body>
</html>
