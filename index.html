<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b; --surface: #111114; --surface2: #18181d;
      --border: #222228; --accent: #e8b04b; --accent2: #c4873a;
      --text: #e8e8ec; --muted: #666672; --danger: #e84b4b;
      --radius: 8px; --header-h: 62px; --tabs-h: 48px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      overflow: hidden; display: flex; flex-direction: column;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, select { font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    /* ─── Header ─── */
    #header {
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); gap: 14px; flex-shrink: 0; z-index: 10;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
    .logo span { color: var(--accent); }

    /* ─── Search ─── */
    #search-wrap { flex: 1; max-width: 500px; display: flex; align-items: center; }
    #search-mode-btn {
      height: 38px; padding: 0 12px; background: var(--accent); color: #000;
      font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      border-radius: 20px 0 0 20px; white-space: nowrap; flex-shrink: 0;
      transition: background .15s; border: none;
    }
    #search-mode-btn:hover { background: var(--accent2); }
    #search-inner { flex: 1; position: relative; }
    #search-inner svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; height: 38px; background: var(--surface2);
      border: 1px solid var(--border); border-left: none;
      border-radius: 0 20px 20px 0; color: var(--text);
      font-size: 14px; padding: 0 34px 0 34px; outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    #clear-search {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 18px; line-height: 1; display: none; padding: 2px 5px;
    }
    #clear-search.visible { display: block; }
    #clear-search:hover { color: var(--text); }

    /* ─── Header right ─── */
    .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    #sort-group { display: flex; gap: 3px; background: var(--surface2); border-radius: 6px; padding: 3px; }
    .sort-btn {
      padding: 4px 9px; border-radius: 4px; font-size: 11px; font-weight: 600;
      color: var(--muted); transition: all .15s; letter-spacing: .3px;
    }
    .sort-btn.active { background: var(--accent); color: #000; }
    .sort-btn:hover:not(.active) { color: var(--text); background: var(--border); }
    .header-stat {
      font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap;
    }
    #theater-hdr-btn {
      width: 32px; height: 32px; background: var(--surface2); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; color: var(--muted);
      transition: all .15s;
    }
    #theater-hdr-btn:hover, #theater-hdr-btn.active { color: var(--accent); background: rgba(232,176,75,.1); }

    /* ─── Server status ─── */
    #server-status { display: flex; align-items: center; gap: 6px; }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s;
    }
    #status-dot.online  { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
    #status-dot.waking  { background: var(--accent); animation: pulse 1s infinite; }
    #status-dot.offline { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

    /* ─── Channel Tabs ─── */
    #tabs-bar {
      height: var(--tabs-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px;
      gap: 4px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    }
    #tabs-bar::-webkit-scrollbar { height: 0; }
    .tab-btn {
      height: 34px; padding: 0 13px; border-radius: 6px; white-space: nowrap;
      font-size: 13px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; gap: 6px; transition: all .15s;
      border: 1px solid transparent; flex-shrink: 0;
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--accent); background: rgba(232,176,75,.1); border-color: rgba(232,176,75,.3); }
    .tab-count {
      font-family: 'DM Mono', monospace; font-size: 10px;
      background: var(--surface2); padding: 1px 6px; border-radius: 8px; color: var(--muted);
    }
    .tab-btn.active .tab-count { background: rgba(232,176,75,.2); color: var(--accent); }

    /* ─── Main ─── */
    #main { flex: 1; overflow-y: auto; padding: 22px 26px; display: flex; flex-direction: column; gap: 18px; }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    #section-title span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }

    /* ─── Grid ─── */
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .card-thumb {
      width: 100%; aspect-ratio: 16/9; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; position: relative; overflow: hidden;
    }
    .card-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.8));
      opacity: 0; transition: opacity .2s;
    }
    .card:hover .card-thumb::after { opacity: 1; }
    .play-overlay {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; z-index: 2; opacity: 0; transition: opacity .2s;
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 44px; height: 44px; background: rgba(232,176,75,.9);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .card-progress {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--accent); z-index: 3;
    }
    /* Badge "En cours" sur la carte */
    .card-resume-badge {
      position: absolute; top: 6px; right: 6px; z-index: 4;
      background: rgba(232,176,75,.92); color: #000;
      font-size: 9px; font-weight: 700; letter-spacing: .4px;
      padding: 2px 6px; border-radius: 8px; text-transform: uppercase;
    }
    .card-info { padding: 10px 12px; }
    .card-title {
      font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
    }
    .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .card-channel {
      background: var(--surface2); padding: 2px 7px; border-radius: 10px;
      color: var(--accent); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .card-size { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .card-ext {
      background: var(--surface2); padding: 2px 5px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    }
    .state-box { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .state-box .icon { font-size: 56px; margin-bottom: 16px; }
    .state-box p { font-size: 15px; }

    /* ─── Toast ─── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 15px; font-size: 13px; display: flex; align-items: center; gap: 9px;
      animation: toastIn .25s ease-out; box-shadow: 0 8px 24px rgba(0,0,0,.5);
      max-width: 300px; pointer-events: all;
    }
    .toast.success { border-color: #4caf5055; }
    .toast.error   { border-color: #e84b4b55; }
    .toast.info    { border-color: rgba(232,176,75,.3); }
    .toast.warn    { border-color: #f0a50055; }
    @keyframes toastIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateX(20px); } }

    /* ─── Modal / Player ─── */
    #modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 100;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); padding: 20px;
    }
    #modal-bg.open { display: flex; }
    #modal-bg.theater { padding: 0; background: #000; }

    #player-wrap {
      width: 100%; max-width: 980px; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,.8); animation: slideUp .25s ease-out;
      position: relative;
    }
    #modal-bg.theater #player-wrap { max-width: 100%; border-radius: 0; border: none; height: 100%; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    #player-header {
      display: flex; align-items: center; padding: 11px 15px;
      border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0;
      transition: opacity .3s, transform .3s; z-index: 5;
    }
    #player-title {
      font-size: 14px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #player-channel {
      font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      color: var(--accent); background: rgba(232,176,75,.1); padding: 3px 8px;
      border-radius: 10px; flex-shrink: 0;
    }
    #close-btn {
      width: 30px; height: 30px; background: var(--surface2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 18px; flex-shrink: 0; transition: all .15s;
    }
    #close-btn:hover { background: var(--border); color: var(--text); }

    #video-container {
      background: #000; position: relative; aspect-ratio: 16/9; width: 100%; flex-shrink: 0;
    }
    #modal-bg.theater #video-container { aspect-ratio: unset; flex: 1; }
    #video-container video { width: 100%; height: 100%; display: block; object-fit: contain; }
    #video-loading {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 14px; pointer-events: none;
      opacity: 0; transition: opacity .2s; background: rgba(0,0,0,.4);
    }
    #video-loading.active { opacity: 1; }
    .spinner {
      width: 30px; height: 30px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Controls ─── */
    #custom-controls {
      background: var(--surface); padding: 10px 13px; flex-shrink: 0;
      transition: opacity .3s, transform .3s; z-index: 5;
    }
    #progress-wrap {
      width: 100%; height: 5px; background: var(--surface2); border-radius: 3px;
      cursor: pointer; position: relative; margin-bottom: 10px; transition: height .15s;
    }
    #progress-wrap:hover { height: 7px; margin-bottom: 8px; }
    #progress-buffer {
      position: absolute; left: 0; top: 0; height: 100%;
      background: #ffffff22; width: 0; border-radius: 3px;
    }
    #progress-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); width: 0; border-radius: 3px; pointer-events: none;
    }
    #progress-thumb {
      position: absolute; top: 50%; width: 13px; height: 13px;
      background: var(--accent); border-radius: 50%;
      transform: translate(-50%, -50%); display: none; pointer-events: none;
    }
    #progress-wrap:hover #progress-thumb { display: block; }

    /* Tooltip de temps sur la barre de progression */
    #progress-tooltip {
      position: absolute; top: -28px; transform: translateX(-50%);
      background: rgba(0,0,0,.85); color: var(--text); border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 6px;
      pointer-events: none; display: none; white-space: nowrap;
    }
    #progress-wrap:hover #progress-tooltip { display: block; }

    #controls-row { display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
    .ctrl-btn {
      height: 32px; min-width: 32px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); transition: background .15s; gap: 3px; padding: 0 5px;
    }
    .ctrl-btn:hover { background: var(--surface2); }
    .ctrl-btn.primary { background: var(--accent); color: #000; }
    .ctrl-btn.primary:hover { background: var(--accent2); }
    .ctrl-btn.pip-active { color: var(--accent); }
    .ctrl-btn.fs-active  { color: var(--accent); }
    .ctrl-btn span { font-size: 10px; font-family: 'DM Mono', monospace; line-height: 1; }

    #volume-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    #volume-slider {
      width: 60px; -webkit-appearance: none; appearance: none;
      background: transparent; height: 20px; cursor: pointer; flex-shrink: 0;
    }
    #volume-slider::-webkit-slider-runnable-track { height: 4px; background: var(--surface2); border-radius: 2px; }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: var(--accent); border-radius: 50%; margin-top: -4px;
    }
    #volume-slider::-moz-range-track { height: 4px; background: var(--surface2); border-radius: 2px; }
    #volume-slider::-moz-range-thumb { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: none; }

    #time-display { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .divider { flex: 1; }
    .ctrl-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    .ctrl-select {
      height: 30px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 11px;
      font-family: 'DM Mono', monospace; padding: 0 5px; outline: none; cursor: pointer; flex-shrink: 0;
    }
    .ctrl-select option { background: var(--surface); }

    /* ══════════════════════════════════════════════════════════
       ─── PLEIN ÉCRAN ───────────────────────────────────────
       ══════════════════════════════════════════════════════════ */

    /* Le player-wrap devient le contexte fullscreen */
    #player-wrap:fullscreen,
    #player-wrap:-webkit-full-screen {
      max-width: 100% !important;
      border-radius: 0 !important;
      border: none !important;
      background: #000 !important;
    }

    /* En fullscreen, le video-container occupe tout l'espace */
    #player-wrap:fullscreen #video-container,
    #player-wrap:-webkit-full-screen #video-container {
      aspect-ratio: unset !important;
      flex: 1;
    }

    /* Header et contrôles en overlay absolu */
    #player-wrap:fullscreen #player-header,
    #player-wrap:-webkit-full-screen #player-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: linear-gradient(rgba(0,0,0,.75), transparent);
      border-bottom: none;
      padding: 14px 18px;
    }

    #player-wrap:fullscreen #custom-controls,
    #player-wrap:-webkit-full-screen #custom-controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      padding-top: 36px;
    }

    /* Auto-masquage des contrôles en fullscreen */
    #player-wrap:fullscreen.hide-ui #player-header,
    #player-wrap:fullscreen.hide-ui #custom-controls,
    #player-wrap:-webkit-full-screen.hide-ui #player-header,
    #player-wrap:-webkit-full-screen.hide-ui #custom-controls {
      opacity: 0;
      pointer-events: none;
    }

    /* Curseur invisible quand les contrôles sont masqués */
    #player-wrap:fullscreen.hide-ui,
    #player-wrap:-webkit-full-screen.hide-ui {
      cursor: none;
    }

    /* ══════════════════════════════════════════════════════════
       ─── RESPONSIVITÉ ──────────────────────────────────────
       ══════════════════════════════════════════════════════════ */

    /* Tablette */
    @media (max-width: 860px) {
      #main { padding: 14px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .header-stat, #sort-group, #theater-hdr-btn { display: none; }
      #status-label { display: none; }
      #volume-slider { width: 48px; }
      .ctrl-select { max-width: 52px; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      :root { --header-h: 52px; --tabs-h: 42px; }

      #header { padding: 0 12px; gap: 8px; }
      .logo { font-size: 17px; }
      #search-mode-btn { font-size: 10px; padding: 0 8px; }
      #search { font-size: 13px; }

      /* Modal plein écran sur mobile */
      #modal-bg { padding: 0; align-items: flex-end; }
      #modal-bg.open { background: #000; }

      #player-wrap {
        border-radius: 14px 14px 0 0;
        border-bottom: none;
        max-height: 92vh;
        overflow: hidden;
      }

      #player-header { padding: 9px 11px; }
      #player-title  { font-size: 12px; }

      /* Contrôles compacts sur mobile */
      #custom-controls { padding: 8px 9px; }

      #controls-row { gap: 3px; }

      /* Masquer les éléments secondaires sur petit écran */
      #quality-select,
      .ctrl-sep,
      #skip-back span,
      #skip-fwd  span { display: none; }

      #volume-slider { width: 40px; }
      .ctrl-btn { min-width: 28px; height: 28px; }
      .ctrl-btn.primary { min-width: 34px; height: 34px; }

      #time-display { font-size: 10px; }
      #speed-select { max-width: 46px; font-size: 10px; }

      /* Barre de progression plus haute = plus facile à toucher */
      #progress-wrap { height: 6px; margin-bottom: 12px; }
      #progress-wrap:hover { height: 8px; margin-bottom: 10px; }

      #grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      #main { padding: 10px; }
    }

    /* Très petit (< 400px) */
    @media (max-width: 400px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
      #search-wrap { max-width: none; }
      #theater-hdr-btn { display: none; }
    }

    /* Paysage mobile */
    @media (max-height: 450px) and (orientation: landscape) {
      #player-wrap { max-height: 100vh; }
      #video-container { aspect-ratio: unset; flex: 1; max-height: 65vh; }
      #player-header { padding: 7px 12px; }
      #custom-controls { padding: 6px 10px; }
      #progress-wrap { margin-bottom: 6px; }
    }
  </style>
</head>
<body>

<!-- ─── Toasts ─── -->
<div id="toast-container"></div>

<!-- ─── Header ─── -->
<header id="header">
  <div class="logo">Stream<span>Vault</span></div>

  <div id="search-wrap">
    <button id="search-mode-btn">🎬 Vidéos</button>
    <div id="search-inner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Rechercher une vidéo…" autocomplete="off" />
      <button id="clear-search">×</button>
    </div>
  </div>

  <div class="header-right">
    <div id="sort-group">
      <button class="sort-btn active" data-sort="recent">Récent</button>
      <button class="sort-btn" data-sort="name">Nom</button>
      <button class="sort-btn" data-sort="size">Taille</button>
    </div>
    <button id="theater-hdr-btn" title="Mode théâtre (T)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
    <div id="server-status">
      <div id="status-dot"></div>
      <span id="status-label">Connexion…</span>
    </div>
    <div class="header-stat" id="total-stat">— vidéos</div>
  </div>
</header>

<!-- ─── Channel Tabs ─── -->
<div id="tabs-bar">
  <span style="color:var(--muted);font-size:13px;padding:0 8px;">⏳ Chargement…</span>
</div>

<!-- ─── Main ─── -->
<main id="main">
  <h2 id="section-title">Toutes les vidéos <span id="section-count"></span></h2>
  <div id="grid">
    <div class="state-box"><div class="icon">⏳</div><p>Connexion au serveur…</p></div>
  </div>
</main>

<!-- ─── Player Modal ─── -->
<div id="modal-bg">
  <div id="player-wrap">
    <div id="player-header">
      <span id="player-channel">—</span>
      <span id="player-title">—</span>
      <button id="close-btn" title="Fermer (Échap)">×</button>
    </div>

    <div id="video-container">
      <video id="video" preload="metadata" playsinline></video>
      <div id="video-loading"><div class="spinner"></div>Chargement…</div>
    </div>

    <div id="custom-controls">
      <!-- Progress bar -->
      <div id="progress-wrap">
        <div id="progress-buffer"></div>
        <div id="progress-bar"></div>
        <div id="progress-thumb"></div>
        <div id="progress-tooltip">0:00</div>
      </div>

      <div id="controls-row">
        <!-- Play/Pause -->
        <button class="ctrl-btn primary" id="play-btn" title="Lecture/Pause (Espace)">
          <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>

        <!-- Skip -10s -->
        <button class="ctrl-btn" id="skip-back" title="Reculer 10s (J / ←)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          </svg>
          <span>10</span>
        </button>

        <!-- Skip +10s -->
        <button class="ctrl-btn" id="skip-fwd" title="Avancer 10s (L / →)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          </svg>
          <span>10</span>
        </button>

        <!-- Volume -->
        <div id="volume-wrap">
          <button class="ctrl-btn" id="mute-btn" title="Muet (M)">
            <svg id="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="1" />
        </div>

        <!-- Time -->
        <div id="time-display">0:00 / 0:00</div>

        <div class="divider"></div>
        <div class="ctrl-sep"></div>

        <!-- Speed -->
        <select id="speed-select" class="ctrl-select" title="Vitesse de lecture">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>

        <!-- Quality -->
        <select id="quality-select" class="ctrl-select" title="Qualité (indicatif)">
          <option value="auto">Auto</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
        </select>

        <div class="ctrl-sep"></div>

        <!-- PiP -->
        <button class="ctrl-btn" id="pip-btn" title="Picture-in-Picture (P)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <rect x="12" y="12" width="8" height="6" rx="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <!-- Theater -->
        <button class="ctrl-btn" id="theater-ctrl-btn" title="Mode théâtre (T)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
        </button>

        <!-- Fullscreen -->
        <button class="ctrl-btn" id="fs-btn" title="Plein écran (F)">
          <!-- icône "entrer" -->
          <svg id="fs-icon-enter" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
          <!-- icône "quitter" (masquée par défaut) -->
          <svg id="fs-icon-exit" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
          </svg>
        </button>

        <!-- Download -->
        <button class="ctrl-btn" id="dl-btn" title="Télécharger (D)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE = 'https://server-video-regarder.onrender.com';
const WAKE_INTERVAL_MS = 14 * 60 * 1000;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtTime = s => {
  if (!isFinite(s) || s < 0) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = Math.floor(s % 60).toString().padStart(2, '0');
  return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${ss}` : `${m}:${ss}`;
};
const esc = str => String(str).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
);

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', ms = 3000) {
  const icons = { info:'💡', success:'✅', error:'❌', warn:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'💡'}</span><span>${esc(msg)}</span>`;
  $('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut .25s ease-in forwards';
    setTimeout(() => el.remove(), 270);
  }, ms);
}

// ─── State ────────────────────────────────────────────────────────────────────
let allVideos      = [];
let channels       = [];
let currentChannel = null;
let currentVideo   = null;
let searchQuery    = '';
let searchMode     = 'videos';
let sortMode       = 'recent';
let theaterMode    = false;

// ─── Auto-wake Render ─────────────────────────────────────────────────────────
async function wakeServer() {
  const dot   = $('status-dot');
  const label = $('status-label');
  dot.className = 'waking';
  label.textContent = 'Réveil…';
  let attempts = 0;
  const MAX = 12;
  const tryPing = async () => {
    try {
      const res = await fetch(`${API_BASE}/api/health`, { signal: AbortSignal.timeout(8000) });
      if (res.ok) {
        dot.className = 'online';
        label.textContent = 'En ligne';
        toast('Serveur connecté !', 'success', 2500);
        return true;
      }
    } catch (_) {}
    attempts++;
    if (attempts < MAX) {
      label.textContent = `Réveil… (${attempts}/${MAX})`;
      setTimeout(tryPing, 5000);
    } else {
      dot.className = 'offline';
      label.textContent = 'Hors ligne';
      toast('Serveur inaccessible. Actualisez la page.', 'error', 7000);
    }
    return false;
  };
  return tryPing();
}
setInterval(() => fetch(`${API_BASE}/api/health`).catch(() => {}), WAKE_INTERVAL_MS);

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─── Sort ─────────────────────────────────────────────────────────────────────
function sortVideos(vids) {
  const v = [...vids];
  if (sortMode === 'recent') return v.sort((a, b) => new Date(b.modified) - new Date(a.modified));
  if (sortMode === 'name')   return v.sort((a, b) => a.title.localeCompare(b.title));
  if (sortMode === 'size')   return v.sort((a, b) => b.size - a.size);
  return v;
}
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    allVideos = sortVideos(allVideos);
    renderVideos();
  });
});

// ─── Channels ─────────────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    channels = await api('/api/channels');
    renderTabs();
  } catch (e) { console.error('loadChannels:', e); }
}
function renderTabs() {
  const bar = $('tabs-bar');
  bar.innerHTML = '';
  const rootCh = channels.find(c => c.name === 'root');
  const totalCount = rootCh ? rootCh.videoCount : channels.reduce((s,c)=>s+c.videoCount,0);
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn' + (currentChannel === null ? ' active' : '');
  allBtn.innerHTML = `🎬 Tout <span class="tab-count">${totalCount}</span>`;
  allBtn.onclick = () => { currentChannel = null; clearSearch(); loadVideos(); renderTabs(); };
  bar.appendChild(allBtn);
  channels.filter(c => c.name !== 'root').forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (currentChannel === ch.name ? ' active' : '');
    btn.innerHTML = `📺 ${esc(ch.name)} <span class="tab-count">${ch.videoCount}</span>`;
    btn.onclick = () => { currentChannel = ch.name; clearSearch(); loadVideos(); renderTabs(); };
    bar.appendChild(btn);
  });
}

// ─── Videos ───────────────────────────────────────────────────────────────────
async function loadVideos() {
  try {
    let url = '/api/videos';
    if (currentChannel) url += `?channel=${encodeURIComponent(currentChannel)}`;
    const data = await api(url);
    allVideos = sortVideos(data);
    renderVideos();
  } catch (e) {
    console.error('loadVideos:', e);
    $('grid').innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>Erreur de connexion</p></div>`;
  }
}
async function searchVideos(q) {
  try {
    const data = await api(`/api/search?q=${encodeURIComponent(q)}`);
    allVideos = sortVideos(data);
    renderVideos();
  } catch (e) { console.error('searchVideos:', e); }
}

// ─── Render Videos ────────────────────────────────────────────────────────────
function renderVideos() {
  const grid = $('grid');
  $('total-stat').textContent = `${allVideos.length} vidéo${allVideos.length > 1 ? 's' : ''}`;
  $('section-count').textContent = `· ${allVideos.length}`;
  const titleNode = $('section-title').childNodes[0];
  if      (searchQuery)    titleNode.textContent = `Résultats pour "${searchQuery}" `;
  else if (currentChannel) titleNode.textContent = `${currentChannel} `;
  else                     titleNode.textContent = `Toutes les vidéos `;

  if (allVideos.length === 0) {
    grid.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>Aucune vidéo trouvée</p></div>`;
    return;
  }
  grid.innerHTML = allVideos.map(v => {
    const saved = getProgress(v.path);
    const pct   = saved && v.duration ? Math.round((saved / v.duration) * 100) : 0;
    const resumeBadge = pct > 1 ? `<div class="card-resume-badge">▶ ${pct}%</div>` : '';
    return `
      <div class="card" data-path="${esc(v.path)}">
        <div class="card-thumb">
          🎞️
          ${resumeBadge}
          <div class="play-overlay">
            <div class="play-circle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          ${pct > 1 ? `<div class="card-progress" style="width:${pct}%"></div>` : ''}
        </div>
        <div class="card-info">
          <div class="card-title" title="${esc(v.title)}">${esc(v.title)}</div>
          <div class="card-meta">
            <span class="card-channel">${esc(v.channel)}</span>
            <span class="card-size">${v.sizeMB} MB</span>
            <span class="card-ext">${esc(v.ext.replace('.',''))}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const v = allVideos.find(v => v.path === card.dataset.path);
      if (v) openPlayer(v);
    });
  });
}

// ─── Progress Memory (localStorage) ──────────────────────────────────────────
function saveProgress(path, time, duration) {
  if (!duration || time < 5) return;
  if (time / duration > 0.95) {
    localStorage.removeItem(`sv:${path}`);
  } else {
    localStorage.setItem(`sv:${path}`, time.toFixed(2));
  }
}
function getProgress(path) {
  const v = parseFloat(localStorage.getItem(`sv:${path}`));
  return isNaN(v) ? null : v;
}

// ─── Search ───────────────────────────────────────────────────────────────────
const SEARCH_LABELS = { videos: '🎬 Vidéos', channels: '📺 Chaînes' };
$('search-mode-btn').addEventListener('click', () => {
  searchMode = searchMode === 'videos' ? 'channels' : 'videos';
  $('search-mode-btn').textContent = SEARCH_LABELS[searchMode];
  $('search').placeholder = searchMode === 'channels' ? 'Rechercher une chaîne…' : 'Rechercher une vidéo…';
  if (searchQuery) doSearch(searchQuery);
});
function clearSearch() {
  $('search').value = '';
  searchQuery = '';
  $('clear-search').classList.remove('visible');
}
function doSearch(q) {
  if (searchMode === 'channels') {
    const ql = q.toLowerCase();
    const matches = channels.filter(c =>
      c.name.toLowerCase().includes(ql) || c.label.toLowerCase().includes(ql)
    );
    if (matches.length === 1) {
      currentChannel = matches[0].name === 'root' ? null : matches[0].name;
      loadVideos(); renderTabs();
    } else {
      toast(`${matches.length} chaîne(s) correspondante(s)`, 'info', 2000);
    }
  } else {
    searchVideos(q);
  }
}
let searchTimer;
$('search').addEventListener('input', e => {
  const q = e.target.value.trim();
  searchQuery = q;
  $('clear-search').classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { if (q) doSearch(q); else loadVideos(); }, 300);
});
$('clear-search').addEventListener('click', () => { clearSearch(); loadVideos(); });

// ─── Theater Mode ─────────────────────────────────────────────────────────────
function toggleTheater() {
  theaterMode = !theaterMode;
  $('modal-bg').classList.toggle('theater', theaterMode);
  $('theater-hdr-btn').classList.toggle('active', theaterMode);
  toast(theaterMode ? 'Mode théâtre activé' : 'Mode théâtre désactivé', 'info', 1500);
}
$('theater-hdr-btn').addEventListener('click', toggleTheater);
$('theater-ctrl-btn').addEventListener('click', toggleTheater);

// ─── Player ───────────────────────────────────────────────────────────────────
const video = $('video');

function openPlayer(v) {
  currentVideo = v;
  $('player-title').textContent   = v.title;
  $('player-channel').textContent = v.channel;
  video.src = `${API_BASE}/stream/${encodeURI(v.path)}`;
  $('modal-bg').classList.add('open');
  $('video-loading').classList.add('active');
  $('speed-select').value = '1';
  video.playbackRate = 1;
  video.load();

  const savedTime = getProgress(v.path);
  if (savedTime) {
    const onMeta = () => {
      video.removeEventListener('loadedmetadata', onMeta);
      video.currentTime = savedTime;
      toast(`▶ Reprise à ${fmtTime(savedTime)}`, 'info', 2500);
    };
    video.addEventListener('loadedmetadata', onMeta);
  }

  video.play().catch(() => {});
}

function closePlayer() {
  if (currentVideo && video.currentTime > 5) {
    saveProgress(currentVideo.path, video.currentTime, video.duration);
  }
  // Quitter le plein écran si actif
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});

  $('modal-bg').classList.remove('open');
  if (theaterMode) toggleTheater();
  video.pause();
  video.removeAttribute('src');
  video.load();
  currentVideo = null;
  renderVideos();
}
$('close-btn').addEventListener('click', closePlayer);
$('modal-bg').addEventListener('click', e => { if (e.target.id === 'modal-bg') closePlayer(); });

// ─── Video Events ─────────────────────────────────────────────────────────────
video.addEventListener('waiting',  () => $('video-loading').classList.add('active'));
video.addEventListener('playing',  () => $('video-loading').classList.remove('active'));
video.addEventListener('canplay',  () => $('video-loading').classList.remove('active'));
video.addEventListener('loadedmetadata', updateTime);
video.addEventListener('timeupdate', () => {
  updateTime();
  if (currentVideo) saveProgress(currentVideo.path, video.currentTime, video.duration);
});
video.addEventListener('progress', updateBuffer);
video.addEventListener('play',  () => updatePlayIcon(true));
video.addEventListener('pause', () => updatePlayIcon(false));
video.addEventListener('ended', () => {
  if (currentVideo) localStorage.removeItem(`sv:${currentVideo.path}`);
  updatePlayIcon(false);
  renderVideos();
});
video.addEventListener('volumechange', updateVolIcon);
video.addEventListener('error', () => {
  $('video-loading').classList.remove('active');
  toast('Erreur de lecture vidéo', 'error');
});

function updateTime() {
  const cur = video.currentTime || 0;
  const dur = video.duration   || 0;
  $('time-display').textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  const pct = dur ? (cur / dur) * 100 : 0;
  $('progress-bar').style.width  = `${pct}%`;
  $('progress-thumb').style.left = `${pct}%`;
}
function updateBuffer() {
  if (!video.buffered.length || !video.duration) return;
  const end = video.buffered.end(video.buffered.length - 1);
  $('progress-buffer').style.width = `${(end / video.duration) * 100}%`;
}
function updatePlayIcon(playing) {
  $('play-icon').innerHTML = playing
    ? '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}
function updateVolIcon() {
  const muted = video.muted || video.volume === 0;
  $('vol-icon').innerHTML = muted
    ? `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
       <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor"/>
       <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor"/>`
    : `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
       <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
  $('volume-slider').value = muted ? 0 : video.volume;
}

// ─── Progress Scrubbing ───────────────────────────────────────────────────────
let scrubbing = false;
function seek(e) {
  if (!video.duration) return;
  const rect  = $('progress-wrap').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = ratio * video.duration;
}
function updateTooltip(e) {
  if (!video.duration) return;
  const rect  = $('progress-wrap').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const tip   = $('progress-tooltip');
  tip.textContent  = fmtTime(ratio * video.duration);
  tip.style.left   = `${ratio * 100}%`;
}
$('progress-wrap').addEventListener('mousemove', updateTooltip);
$('progress-wrap').addEventListener('mousedown', e => { scrubbing = true; seek(e); });
document.addEventListener('mousemove',  e => { if (scrubbing) seek(e); });
document.addEventListener('mouseup',    () => { scrubbing = false; });
$('progress-wrap').addEventListener('touchstart', e => { scrubbing = true; seek(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove',  e => { if (scrubbing) seek(e.touches[0]); }, { passive: true });
document.addEventListener('touchend',   () => { scrubbing = false; });

// ─── Controls ─────────────────────────────────────────────────────────────────
$('play-btn').addEventListener('click', () => video.paused ? video.play() : video.pause());
$('skip-back').addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - 10);
  toast('-10s', 'info', 800);
});
$('skip-fwd').addEventListener('click', () => {
  video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
  toast('+10s', 'info', 800);
});
$('volume-slider').addEventListener('input', e => {
  video.volume = Number(e.target.value);
  video.muted  = video.volume === 0;
});
$('mute-btn').addEventListener('click', () => { video.muted = !video.muted; });
$('speed-select').addEventListener('change', e => {
  video.playbackRate = Number(e.target.value);
  toast(`Vitesse : ${e.target.value}×`, 'info', 1500);
});
$('quality-select').addEventListener('change', e => {
  const q = e.target.value;
  toast(`Qualité : ${q === 'auto' ? 'Auto' : q + 'p'} (source originale)`, 'info', 2500);
});

// PiP
$('pip-btn').addEventListener('click', async () => {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      $('pip-btn').classList.remove('pip-active');
    } else {
      await video.requestPictureInPicture();
      $('pip-btn').classList.add('pip-active');
      toast('Mode PiP activé', 'success', 2000);
    }
  } catch (_) { toast('PiP non supporté ou désactivé', 'warn'); }
});
video.addEventListener('leavepictureinpicture', () => $('pip-btn').classList.remove('pip-active'));

// Download
$('dl-btn').addEventListener('click', () => {
  if (!currentVideo) return;
  const a = document.createElement('a');
  a.href     = `${API_BASE}/download/${encodeURI(currentVideo.path)}`;
  a.download = currentVideo.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast(`Téléchargement : "${currentVideo.title}"`, 'info', 2000);
});

// ════════════════════════════════════════════════════════════════
// ─── PLEIN ÉCRAN ────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════
const playerWrap = $('player-wrap');

function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    // Entrer en plein écran sur le player entier (avec les contrôles)
    const req = playerWrap.requestFullscreen || playerWrap.webkitRequestFullscreen;
    if (req) req.call(playerWrap).catch(() => {});
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document).catch(() => {});
  }
}
$('fs-btn').addEventListener('click', toggleFullscreen);

// Mise à jour de l'icône fullscreen + auto-masquage des contrôles
function onFullscreenChange() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  $('fs-icon-enter').style.display = isFs ? 'none'  : '';
  $('fs-icon-exit').style.display  = isFs ? ''      : 'none';
  $('fs-btn').classList.toggle('fs-active', isFs);

  if (isFs) {
    startAutoHide();
  } else {
    stopAutoHide();
    playerWrap.classList.remove('hide-ui');
  }
}
document.addEventListener('fullscreenchange',       onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

// Auto-masquage des contrôles après 3 s d'inactivité en plein écran
let hideTimer = null;
function startAutoHide() {
  clearTimeout(hideTimer);
  playerWrap.classList.remove('hide-ui');
  hideTimer = setTimeout(() => playerWrap.classList.add('hide-ui'), 3000);
}
function stopAutoHide() {
  clearTimeout(hideTimer);
  hideTimer = null;
}
// Réactiver les contrôles dès qu'on bouge la souris / touche l'écran
playerWrap.addEventListener('mousemove', () => {
  if (document.fullscreenElement || document.webkitFullscreenElement) startAutoHide();
});
playerWrap.addEventListener('touchstart', () => {
  if (document.fullscreenElement || document.webkitFullscreenElement) startAutoHide();
}, { passive: true });
// Double-tap sur la vidéo pour activer/quitter le plein écran (mobile)
let lastTap = 0;
$('video-container').addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) toggleFullscreen();
  lastTap = now;
});

// ─── Keyboard Shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!$('modal-bg').classList.contains('open')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  switch (e.key) {
    case 'Escape':
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(() => {});
      } else {
        closePlayer();
      }
      break;
    case ' ':
      e.preventDefault();
      video.paused ? video.play() : video.pause();
      break;
    case 'ArrowLeft':
    case 'j': case 'J':
      e.preventDefault();
      video.currentTime = Math.max(0, video.currentTime - 10);
      break;
    case 'ArrowRight':
    case 'l': case 'L':
      e.preventDefault();
      video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
      break;
    case 'ArrowUp':
      e.preventDefault();
      video.volume = Math.min(1, video.volume + 0.1);
      $('volume-slider').value = video.volume;
      break;
    case 'ArrowDown':
      e.preventDefault();
      video.volume = Math.max(0, video.volume - 0.1);
      $('volume-slider').value = video.volume;
      break;
    case 'm': case 'M': video.muted = !video.muted; break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 't': case 'T': toggleTheater(); break;
    case 'p': case 'P': $('pip-btn').click(); break;
    case 'd': case 'D': $('dl-btn').click(); break;
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  const online = await wakeServer();
  if (online) {
    await loadChannels();
    await loadVideos();
  }
})();
</script>
</body>
